<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>TomTom Interactive Map</title>

    <!-- Microsoft Teams SDK (for Stage View / Task Module embedding) -->
    <script src="https://res.cdn.office.net/teams-js/2.31.1/js/MicrosoftTeams.min.js" crossorigin="anonymous"></script>

    <!-- TomTom Maps SDK -->
    <link rel="stylesheet" href="https://api.tomtom.com/maps-sdk-for-web/cdn/5.x/5.73.0/maps/maps.css">
    <script src="https://api.tomtom.com/maps-sdk-for-web/cdn/5.x/5.73.0/maps/maps-web.min.js"></script>

    <!-- MapLibre GL JS fallback -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.2.0/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@5.2.0/dist/maplibre-gl.js"></script>

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --header-height: 48px;
            --bg-primary: #ffffff;
            --bg-secondary: #f4f5f7;
            --text-primary: #1a1a2e;
            --text-secondary: #555770;
            --accent: #003d6b;
            --accent-light: #0074d9;
            --border: #dde0e4;
            --shadow: 0 2px 8px rgba(0,0,0,0.10);
            --error-bg: #fef2f2;
            --error-text: #991b1b;
            --error-border: #fecaca;
        }

        .dark-theme {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0b8;
            --accent: #4da8ff;
            --accent-light: #80c0ff;
            --border: #2a2a4a;
            --shadow: 0 2px 8px rgba(0,0,0,0.35);
            --error-bg: #3b1010;
            --error-text: #fca5a5;
            --error-border: #7f1d1d;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Header */
        #app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        #app-header .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        #app-header .header-logo {
            width: 26px;
            height: 26px;
            flex-shrink: 0;
        }

        #app-header .header-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #app-header .header-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .header-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .header-btn:hover {
            background: var(--border);
        }

        .header-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* Map container */
        #map-container {
            position: fixed;
            top: var(--header-height);
            left: 0;
            right: 0;
            bottom: 0;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* ASCILINE-style live ASCII / pixel render overlay */
        #ascii-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: none;
            background: #050505;
            z-index: 5;
            pointer-events: none;   /* drag/scroll pass through to the live map */
        }
        body.ascii-on #ascii-canvas { display: block; }
        /* In ASCII/pixel mode hide the raw map chrome so only the art shows */
        body.ascii-on .maplibregl-control-container,
        body.ascii-on .mapboxgl-control-container { display: none !important; }
        body.ascii-on #attribution {
            background: rgba(5,5,5,0.7);
            color: #00ff41;
            text-shadow: 0 0 6px rgba(0,255,65,0.5);
        }
        #ascii-badge {
            position: fixed;
            left: 12px;
            bottom: 10px;
            z-index: 999;
            display: none;
            align-items: center;
            gap: 8px;
            font-family: 'Consolas','SF Mono',Menlo,monospace;
            font-size: 12px;
            letter-spacing: 0.4px;
            color: #00ff41;
            background: rgba(5,5,5,0.65);
            border: 1px solid rgba(0,255,65,0.35);
            border-radius: 6px;
            padding: 5px 10px;
            text-shadow: 0 0 6px rgba(0,255,65,0.6);
            pointer-events: none;
        }
        body.ascii-on #ascii-badge { display: flex; }
        #ascii-badge .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #00ff41; box-shadow: 0 0 8px #00ff41;
            animation: ascii-pulse 1.4s ease-in-out infinite;
        }
        @keyframes ascii-pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

        /* Attribution */
        #attribution {
            position: fixed;
            bottom: 4px;
            right: 8px;
            background: rgba(255,255,255,0.85);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #555;
            z-index: 999;
            pointer-events: none;
        }

        .dark-theme #attribution {
            background: rgba(26,26,46,0.85);
            color: #a0a0b8;
        }

        /* Error overlay */
        #error-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-secondary);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        #error-overlay.visible {
            display: flex;
        }

        .error-card {
            background: var(--bg-primary);
            border: 1px solid var(--error-border);
            border-radius: 12px;
            padding: 32px 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .error-card .error-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .error-card h2 {
            font-size: 18px;
            color: var(--error-text);
            margin-bottom: 8px;
        }

        .error-card p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .error-card code {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            word-break: break-all;
        }

        /* Loading overlay */
        #loading-overlay {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-secondary);
            z-index: 1999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 16px;
            transition: opacity 0.3s;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Popup styles */
        .marker-popup .maplibregl-popup-content,
        .marker-popup .mapboxgl-popup-content {
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            max-width: 260px;
        }

        .popup-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .popup-description {
            font-size: 13px;
            color: #555770;
            line-height: 1.4;
        }

        .popup-coords {
            font-size: 11px;
            color: #888;
            margin-top: 6px;
        }

        /* Custom marker */
        .custom-marker {
            cursor: pointer;
            transition: transform 0.15s;
        }

        .custom-marker:hover {
            transform: scale(1.15);
        }

        /* Responsive */
        @media (max-width: 480px) {
            :root {
                --header-height: 44px;
            }
            #app-header {
                padding: 0 10px;
            }
            #app-header .header-title {
                font-size: 13px;
            }
            .header-btn {
                padding: 4px 8px;
                font-size: 12px;
            }
            .header-btn .btn-label {
                display: none;
            }
        }

        /* Teams embedded mode - compact header */
        .teams-embedded {
            --header-height: 36px;
        }

        .teams-embedded #app-header {
            padding: 0 8px;
        }

        .teams-embedded #app-header .header-title {
            font-size: 13px;
        }

        .teams-embedded .header-btn {
            padding: 3px 6px;
            font-size: 11px;
        }

        .teams-embedded .header-btn .btn-label {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header id="app-header">
        <div class="header-left">
            <svg class="header-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="15" fill="var(--accent)" stroke="var(--accent)" stroke-width="1"/>
                <path d="M16 6C12.14 6 9 9.14 9 13c0 5.25 7 13 7 13s7-7.75 7-13c0-3.86-3.14-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#fff"/>
            </svg>
            <span class="header-title" id="header-title">TomTom Interactive Map</span>
        </div>
        <div class="header-controls">
            <button class="header-btn" id="btn-ascii" title="Live ASCII / pixel map">
                <span>&#9638;</span>
                <span class="btn-label" id="ascii-label">ASCII</span>
            </button>
            <button class="header-btn" id="btn-traffic" title="Toggle traffic layer">
                <span>&#128678;</span>
                <span class="btn-label">Traffic</span>
            </button>
            <button class="header-btn" id="btn-theme" title="Toggle dark/light theme">
                <span id="theme-icon">&#9790;</span>
                <span class="btn-label">Theme</span>
            </button>
        </div>
    </header>

    <!-- Map -->
    <div id="map-container">
        <div id="map"></div>
        <canvas id="ascii-canvas"></canvas>
    </div>

    <!-- Attribution -->
    <div id="attribution">Powered by TomTom</div>

    <!-- ASCII / pixel mode badge -->
    <div id="ascii-badge"><span class="dot"></span><span id="ascii-badge-text">ASCII MODE</span></div>

    <!-- Loading -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading map...</div>
    </div>

    <!-- Error -->
    <div id="error-overlay">
        <div class="error-card">
            <div class="error-icon">&#9888;&#65039;</div>
            <h2 id="error-title">Map Error</h2>
            <p id="error-message"></p>
            <code id="error-detail"></code>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // ───────────────────────────────────────────
        // Microsoft Teams SDK initialization
        // ───────────────────────────────────────────
        var isInTeams = false;
        var teamsContext = null;

        function initTeams() {
            if (typeof microsoftTeams === 'undefined') return Promise.resolve(false);
            try {
                // Race the SDK init against a timeout - Teams shows
                // "refused to connect" if notifyAppLoaded isn't called quickly
                var timeout = new Promise(function(resolve) {
                    setTimeout(function() { resolve(false); }, 3000);
                });

                var sdkInit = microsoftTeams.app.initialize().then(function() {
                    isInTeams = true;
                    // Immediately tell Teams we're loaded
                    try { microsoftTeams.app.notifyAppLoaded(); } catch(e) {}
                    return microsoftTeams.app.getContext();
                }).then(function(context) {
                    teamsContext = context;
                    document.body.classList.add('teams-embedded');
                    microsoftTeams.app.notifySuccess();
                    console.log('Teams SDK initialized. Frame context:', context.page && context.page.frameContext);
                    return true;
                }).catch(function(err) {
                    console.log('Teams SDK init error:', err.message || err);
                    return false;
                });

                return Promise.race([sdkInit, timeout]);
            } catch(e) {
                return Promise.resolve(false);
            }
        }

        // ───────────────────────────────────────────
        // Utility: parse URL parameters
        // ───────────────────────────────────────────
        function getParams() {
            var params = new URLSearchParams(window.location.search);
            return {
                apiKey:  params.get('apiKey') || '',
                center:  params.get('center') || '',
                zoom:    parseFloat(params.get('zoom')) || 13,
                markers: params.get('markers') || '',
                route:   params.get('route') || '',
                traffic: params.get('traffic') === 'true',
                vizId:   params.get('vizId') || '',
                mcpUrl:  params.get('mcpUrl') || '',
                overlay: params.get('overlay') || '',
                render:  (params.get('render') || '').toLowerCase(),  // '' | 'ascii' | 'pixel'
                cols:    parseInt(params.get('cols'), 10) || 0,
                title:   params.get('title') || 'TomTom Interactive Map'
            };
        }

        // ───────────────────────────────────────────
        // Utility: decode Base64 JSON safely
        // ───────────────────────────────────────────
        function decodeBase64Json(str) {
            if (!str) return null;
            try {
                var decoded = atob(str);
                return JSON.parse(decoded);
            } catch (e) {
                // Try URL-safe base64
                try {
                    var safe = str.replace(/-/g, '+').replace(/_/g, '/');
                    var decoded2 = atob(safe);
                    return JSON.parse(decoded2);
                } catch (e2) {
                    console.warn('Failed to decode base64 JSON:', e2);
                    return null;
                }
            }
        }

        // ───────────────────────────────────────────
        // Utility: parse center string
        // ───────────────────────────────────────────
        function parseCenter(str, fallback) {
            if (!str) return fallback;
            var parts = str.split(',').map(function(s) { return parseFloat(s.trim()); });
            if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                return { lat: parts[0], lon: parts[1] };
            }
            return fallback;
        }

        // ───────────────────────────────────────────
        // Error display
        // ───────────────────────────────────────────
        function showError(title, message, detail) {
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('error-title').textContent = title;
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-detail').textContent = detail || '';
            document.getElementById('error-detail').style.display = detail ? 'inline-block' : 'none';
            document.getElementById('error-overlay').classList.add('visible');
        }

        function hideLoading() {
            var el = document.getElementById('loading-overlay');
            el.classList.add('hidden');
            setTimeout(function() { el.style.display = 'none'; }, 350);
        }

        // ───────────────────────────────────────────
        // State
        // ───────────────────────────────────────────
        var map = null;
        var isDark = false;
        var trafficOn = false;
        var trafficLayer = null;
        var params = getParams();

        // Set page title
        document.title = params.title;
        document.getElementById('header-title').textContent = params.title;

        // ───────────────────────────────────────────
        // Theme toggle
        // ───────────────────────────────────────────
        var btnTheme = document.getElementById('btn-theme');
        var themeIcon = document.getElementById('theme-icon');

        btnTheme.addEventListener('click', function() {
            isDark = !isDark;
            document.body.classList.toggle('dark-theme', isDark);
            themeIcon.innerHTML = isDark ? '&#9788;' : '&#9790;';
            btnTheme.classList.toggle('active', isDark);

            if (map && map.setStyle && params.apiKey) {
                // Preserve sources and layers before style change
                try {
                    var styleBase = isDark
                        ? 'https://api.tomtom.com/style/2/custom/style/dG9tdG9tQEBAVHVGWnprSEExOWhQUU5Edg.json?key=' + params.apiKey
                        : 'https://api.tomtom.com/style/1/style/22.2.1-*?map=2/basic_street-light&traffic_incidents=2/incidents_light&traffic_flow=2/flow_light&poi=2/poi_light&key=' + params.apiKey;

                    // For TomTom SDK v5, just use the map style approach
                    if (typeof tt !== 'undefined' && map._tomtomMap) {
                        // TomTom SDK handles themes differently
                        return;
                    }
                } catch(e) {
                    console.warn('Style switch not supported:', e);
                }
            }
        });

        // ───────────────────────────────────────────
        // Traffic toggle
        // ───────────────────────────────────────────
        var btnTraffic = document.getElementById('btn-traffic');

        btnTraffic.addEventListener('click', function() {
            trafficOn = !trafficOn;
            btnTraffic.classList.toggle('active', trafficOn);
            toggleTraffic(trafficOn);
        });

        // ───────────────────────────────────────────
        // ASCII / pixel render-mode toggle (cycles Map → ASCII → Pixel)
        // ───────────────────────────────────────────
        var btnAscii = document.getElementById('btn-ascii');
        var asciiLabel = document.getElementById('ascii-label');
        function currentRenderMode() {
            return params.render === 'pixel' ? 'pixel' : (params.render === 'ascii' ? 'ascii' : 'map');
        }
        (function initAsciiButton() {
            var cur = currentRenderMode();
            var labels = { map: 'ASCII', ascii: 'Pixel', pixel: 'Normal' };
            if (asciiLabel) asciiLabel.textContent = labels[cur];
            btnAscii.classList.toggle('active', cur !== 'map');
            btnAscii.title = cur === 'map' ? 'Switch to live ASCII map'
                : cur === 'ascii' ? 'Switch to live pixel map' : 'Back to the normal map';
        })();
        btnAscii.addEventListener('click', function() {
            var cur = currentRenderMode();
            var next = cur === 'map' ? 'ascii' : (cur === 'ascii' ? 'pixel' : 'map');
            var u = new URL(window.location.href);
            if (next === 'map') u.searchParams.delete('render');
            else u.searchParams.set('render', next);
            window.location.assign(u.toString());
        });

        function toggleTraffic(show) {
            if (!map) return;

            // TomTom SDK v5 approach
            if (typeof tt !== 'undefined') {
                try {
                    if (show) {
                        map.showTrafficFlow();
                        map.showTrafficIncidents();
                    } else {
                        map.hideTrafficFlow();
                        map.hideTrafficIncidents();
                    }
                    return;
                } catch(e) {
                    console.warn('TomTom traffic toggle error:', e);
                }
            }

            // MapLibre fallback - add/remove traffic source
            try {
                if (show && params.apiKey) {
                    if (!map.getSource('tomtom-traffic')) {
                        map.addSource('tomtom-traffic', {
                            type: 'raster',
                            tiles: [
                                'https://api.tomtom.com/traffic/map/4/tile/flow/relative0/{z}/{x}/{y}.png?key=' + params.apiKey + '&thickness=10'
                            ],
                            tileSize: 256
                        });
                        map.addLayer({
                            id: 'tomtom-traffic-layer',
                            type: 'raster',
                            source: 'tomtom-traffic',
                            paint: { 'raster-opacity': 0.7 }
                        });
                    } else {
                        map.setLayoutProperty('tomtom-traffic-layer', 'visibility', 'visible');
                    }
                } else {
                    if (map.getLayer('tomtom-traffic-layer')) {
                        map.setLayoutProperty('tomtom-traffic-layer', 'visibility', 'none');
                    }
                }
            } catch(e) {
                console.warn('Traffic layer error:', e);
            }
        }

        // ───────────────────────────────────────────
        // Create marker element
        // ───────────────────────────────────────────
        function createMarkerElement(color) {
            var el = document.createElement('div');
            el.className = 'custom-marker';
            var c = color || '#e74c3c';
            el.innerHTML =
                '<svg width="28" height="40" viewBox="0 0 28 40" fill="none" xmlns="http://www.w3.org/2000/svg">' +
                '<path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 26 14 26s14-15.5 14-26C28 6.27 21.73 0 14 0z" fill="' + c + '"/>' +
                '<circle cx="14" cy="13" r="5" fill="#fff"/>' +
                '</svg>';
            return el;
        }

        // ───────────────────────────────────────────
        // Add markers to map
        // ───────────────────────────────────────────
        function addMarkers(markersData) {
            if (!markersData || !Array.isArray(markersData) || markersData.length === 0) return;

            markersData.forEach(function(m) {
                var lat = parseFloat(m.lat);
                var lon = parseFloat(m.lon || m.lng || m.longitude);
                if (isNaN(lat) || isNaN(lon)) return;

                var popupHtml =
                    '<div>' +
                    (m.label ? '<div class="popup-title">' + escapeHtml(m.label) + '</div>' : '') +
                    (m.description ? '<div class="popup-description">' + escapeHtml(m.description) + '</div>' : '') +
                    (m.address ? '<div class="popup-description" style="margin-top:4px;font-style:italic;">' + escapeHtml(m.address) + '</div>' : '') +
                    '<div class="popup-coords">' + lat.toFixed(5) + ', ' + lon.toFixed(5) + '</div>' +
                    '</div>';

                var el = createMarkerElement(m.color);

                if (typeof tt !== 'undefined') {
                    // TomTom SDK
                    var popup = new tt.Popup({ offset: [0, -36], className: 'marker-popup' })
                        .setHTML(popupHtml);
                    new tt.Marker({ element: el })
                        .setLngLat([lon, lat])
                        .setPopup(popup)
                        .addTo(map);
                } else if (typeof maplibregl !== 'undefined') {
                    // MapLibre fallback
                    var popup = new maplibregl.Popup({ offset: [0, -36], className: 'marker-popup' })
                        .setHTML(popupHtml);
                    new maplibregl.Marker({ element: el })
                        .setLngLat([lon, lat])
                        .setPopup(popup)
                        .addTo(map);
                }
            });
        }

        // ───────────────────────────────────────────
        // Draw route on map
        // ───────────────────────────────────────────
        function drawRoute(routeData) {
            if (!routeData || !params.apiKey) return;

            var origin = routeData.origin;
            var destination = routeData.destination;
            var waypoints = routeData.waypoints || [];

            if (!origin || !destination) return;

            // Build locations string for TomTom Routing API
            var locations = origin.lat + ',' + origin.lon;
            waypoints.forEach(function(wp) {
                locations += ':' + wp.lat + ',' + wp.lon;
            });
            locations += ':' + destination.lat + ',' + destination.lon;

            var url = 'https://api.tomtom.com/routing/1/calculateRoute/' +
                      locations +
                      '/json?key=' + params.apiKey +
                      '&traffic=true&travelMode=car';

            fetch(url)
                .then(function(res) {

            ovInjectCss();
            keys.forEach(function (k) { addOverlay(k, center); });
        }

        // ───────────────────────────────────────────
        // ASCILINE-style live ASCII / pixel map renderer
        // Samples the live MapLibre WebGL canvas each frame and re-draws it
        // as colored ASCII glyphs (luminance ramp) or colored blocks (pixel).
        // The map keeps rendering underneath, so pan/zoom updates the art live.
        // ───────────────────────────────────────────
        var ascii = {
            mode: '', on: false, canvas: null, ctx: null, off: null, offCtx: null,
            cols: 0, dpr: 1, scheduled: false, lastDraw: 0
        };
        var ASCII_RAMP = ' .:-=+*#%@';   // luminance ramp: dark -> dense

        function asciiActive() { return ascii.mode === 'ascii' || ascii.mode === 'pixel'; }
        function asciiDefaultCols(mode) { return params.cols || (mode === 'pixel' ? 240 : 150); }

        function setupAsciiCanvas() {
            if (ascii.canvas) return;
            ascii.canvas = document.getElementById('ascii-canvas');
            ascii.ctx = ascii.canvas.getContext('2d');
            ascii.off = document.createElement('canvas');
            ascii.offCtx = ascii.off.getContext('2d', { willReadFrequently: true });
        }

        function resizeAsciiCanvas() {
            if (!ascii.canvas) return;
            var dpr = window.devicePixelRatio || 1;
            if (ascii.mode === 'ascii') dpr = Math.min(dpr, 1.5); // cap for glyph perf
            ascii.dpr = dpr;
            var w = ascii.canvas.clientWidth, h = ascii.canvas.clientHeight;
            ascii.canvas.width = Math.max(1, Math.round(w * dpr));
            ascii.canvas.height = Math.max(1, Math.round(h * dpr));
        }

        function scheduleAscii() {
            if (!asciiActive() || ascii.scheduled) return;
            ascii.scheduled = true;
            requestAnimationFrame(function (t) {
                ascii.scheduled = false;
                if (t - ascii.lastDraw < 28) { scheduleAscii(); return; } // ~30fps
                ascii.lastDraw = t;
                renderAsciiFrame();
            });
        }

        var asciiFellBack = false;
        function asciiSecurityFallback() {
            if (asciiFellBack) return;
            asciiFellBack = true;
            console.warn('ASCII sampling blocked (map pixels not readable).');
            var el = document.getElementById('ascii-badge-text');
            if (el) el.textContent = 'ASCII unavailable (map pixels not readable)';
        }

        function renderAsciiFrame() {
            if (!asciiActive() || !map) return;
            var src;
            try { src = map.getCanvas(); } catch (e) { return; }
            if (!src || !src.width) return;

            var cssW = ascii.canvas.clientWidth, cssH = ascii.canvas.clientHeight;
            if (!cssW || !cssH) return;
            if (ascii.canvas.width !== Math.round(cssW * ascii.dpr)) resizeAsciiCanvas();

            var cols = ascii.cols;
            var charAspect = (ascii.mode === 'pixel') ? 1 : 0.55; // glyph width/height
            var cellW = cssW / cols;
            var cellH = cellW / charAspect;
            var rows = Math.max(1, Math.ceil(cssH / cellH));

            var off = ascii.off, octx = ascii.offCtx;
            if (off.width !== cols || off.height !== rows) { off.width = cols; off.height = rows; }

            try { octx.drawImage(src, 0, 0, cols, rows); }
            catch (e) { return; }

            var data;
            try { data = octx.getImageData(0, 0, cols, rows).data; }
            catch (e) { asciiSecurityFallback(); return; }

            var ctx = ascii.ctx;
            ctx.setTransform(ascii.dpr, 0, 0, ascii.dpr, 0, 0);
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, cssW, cssH);

            if (ascii.mode === 'pixel') {
                for (var y = 0; y < rows; y++) {
                    for (var x = 0; x < cols; x++) {
                        var i = (y * cols + x) * 4;
                        if (data[i + 3] === 0) continue;
                        ctx.fillStyle = 'rgb(' + data[i] + ',' + data[i + 1] + ',' + data[i + 2] + ')';
                        ctx.fillRect(x * cellW, y * cellH, cellW + 0.6, cellH + 0.6);
                    }
                }
            } else {
                var fs = cellH * 1.05;
                ctx.font = '700 ' + fs.toFixed(1) + "px 'Consolas','SF Mono',Menlo,monospace";
                ctx.textBaseline = 'top';
                var rampMax = ASCII_RAMP.length - 1;
                for (var y2 = 0; y2 < rows; y2++) {
                    for (var x2 = 0; x2 < cols; x2++) {
                        var j = (y2 * cols + x2) * 4;
                        var r = data[j], g = data[j + 1], b = data[j + 2];
                        var lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                        var ch = ASCII_RAMP[Math.round(lum * rampMax)];
                        if (ch === ' ') continue;
                        ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
                        ctx.fillText(ch, x2 * cellW, y2 * cellH);
                    }
                }
            }

            var badge = document.getElementById('ascii-badge-text');
            if (badge && !asciiFellBack) {
                badge.textContent = (ascii.mode === 'pixel' ? 'PIXEL' : 'ASCII') +
                    ' MODE · ' + cols + '×' + rows + ' · drag to pan, scroll to zoom';
            }
        }

        function onAsciiResize() {
            if (!asciiActive()) return;
            resizeAsciiCanvas();
            scheduleAscii();
        }

        function enableAscii(mode) {
            if (ascii.on) return;            // idempotent
            ascii.on = true;
            ascii.mode = (mode === 'pixel') ? 'pixel' : 'ascii';
            ascii.cols = asciiDefaultCols(ascii.mode);
            document.body.classList.add('ascii-on');
            setupAsciiCanvas();
            resizeAsciiCanvas();
            map.on('render', scheduleAscii);   // live update while map repaints
            map.on('moveend', renderAsciiFrame);
            window.addEventListener('resize', onAsciiResize);
            renderAsciiFrame();
        }

        // Start ASCII as soon as the map can paint anything — don't wait for the
        // (sometimes slow) full 'load' event. The render loop then fills in tiles
        // progressively as they stream in, so the view never hangs on the spinner.
        function armAscii(mode) {
            function go() {
                if (ascii.on) return;
                hideLoading();
                enableAscii(mode);
            }
            map.on('load', go);
            map.once('styledata', function () { setTimeout(go, 250); });
            setTimeout(go, 2500);            // hard fallback
        }

        // ───────────────────────────────────────────
        // Initialize map
        // ───────────────────────────────────────────
        function init() {
            // Validate API key
            if (!params.apiKey) {
                showError(
                    'API Key Required',
                    'A TomTom API key is needed to load the map. Please include the apiKey parameter in the URL.',
                    'Example: ?apiKey=YOUR_KEY&center=51.5074,-0.1278&zoom=13'
                );
                return;
            }

            var defaultCenter = { lat: 51.5074, lon: -0.1278 }; // London
            var center = parseCenter(params.center, defaultCenter);
            var markersData = decodeBase64Json(params.markers);
            var routeData = decodeBase64Json(params.route);

            // ASCII / pixel mode needs readable WebGL pixels -> force MapLibre + preserveDrawingBuffer
            var wantAscii = (params.render === 'ascii' || params.render === 'pixel');

            // Try TomTom SDK first (unless ASCII/pixel mode, which requires MapLibre)
            if (typeof tt !== 'undefined' && tt.map && !wantAscii) {
                try {
                    map = tt.map({
                        key: params.apiKey,
                        container: 'map',
                        center: [center.lon, center.lat],
                        zoom: params.zoom,
                        language: 'en-US'
                    });

                    map.addControl(new tt.NavigationControl(), 'top-right');
                    map.addControl(new tt.FullscreenControl(), 'top-right');

                    map.on('load', function() {
                        hideLoading();

                        // Add markers
                        if (markersData) {
                            addMarkers(markersData);
                            fitToMarkers(markersData);
                        }

                        // Draw route
                        if (routeData) {
                            drawRoute(routeData);
                        }

                        // Traffic
                        if (params.traffic) {
                            trafficOn = true;
                            btnTraffic.classList.add('active');
                            toggleTraffic(true);
                        }

                        // Fetch viz data
                        if (params.vizId && params.mcpUrl) {
                            fetchVizData(params.vizId, params.mcpUrl).then(function(vizData) {
                                if (vizData) applyVizData(vizData);
                            });
                        }

                        // Live data overlays (earthquakes / UK crime / floods / bikes)
                        renderOverlays(center);
                    });

                    map.on('error', function(e) {
                        console.error('Map error:', e);
                    });

                    return;
                } catch(e) {
                    console.warn('TomTom SDK init failed, trying MapLibre:', e);
                }
            }

            // Fallback: MapLibre GL JS with TomTom tile server
            if (typeof maplibregl !== 'undefined') {
                try {
                    // TomTom vector style with map + POI layers
                    var vectorStyleUrl = 'https://api.tomtom.com/style/1/style/22.2.1-*?map=2/basic_street-light&poi=2/poi_light&key=' + params.apiKey;

                    map = new maplibregl.Map({
                        container: 'map',
                        style: vectorStyleUrl,
                        center: [center.lon, center.lat],
                        zoom: params.zoom,
                        attributionControl: true,
                        preserveDrawingBuffer: wantAscii
                    });

                    map.addControl(new maplibregl.NavigationControl(), 'top-right');
                    map.addControl(new maplibregl.FullscreenControl(), 'top-right');

                    // ASCII / pixel live render mode — arm early so it doesn't wait on full load
                    if (wantAscii) armAscii(params.render);

                    map.on('load', function() {
                        hideLoading();

                        // Add markers
                        if (markersData) {
                            addMarkers(markersData);
                            fitToMarkers(markersData);
                        }

                        // Draw route
                        if (routeData) {
                            drawRoute(routeData);
                        }

                        // Traffic
                        if (params.traffic) {
                            trafficOn = true;
                            btnTraffic.classList.add('active');
                            toggleTraffic(true);
                        }

                        // Fetch viz data
                        if (params.vizId && params.mcpUrl) {
                            fetchVizData(params.vizId, params.mcpUrl).then(function(vizData) {
                                if (vizData) applyVizData(vizData);
                            });
                        }

                        // Live data overlays (earthquakes / UK crime / floods / bikes)
                        renderOverlays(center);
                    });

                    map.on('error', function(e) {
                        console.error('MapLibre error:', e);
                    });

                    return;
                } catch(e) {
                    console.warn('MapLibre init failed:', e);
                }
            }

            // Both failed
            showError(
                'Map SDK Unavailable',
                'Could not initialize the map. Please check your internet connection and try refreshing the page.',
                'Neither TomTom SDK nor MapLibre GL could be loaded.'
            );
        }

        // ───────────────────────────────────────────
        // Boot
        // ───────────────────────────────────────────
        function boot() {
            initTeams().then(function() {
                init();
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', boot);
        } else {
            boot();
        }
    })();
    </script>
</body>
</html>
